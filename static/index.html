<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS LEGAL CORE v4.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyber-blue: #00f2ff; --cyber-pink: #ff00ea; --cyber-bg: #050505; }
        body { background-color: var(--cyber-bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 255, 0.2); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .cyber-btn { background: transparent; border: 1px solid var(--cyber-blue); transition:all 0.3s; cursor: pointer; }
        .cyber-btn:hover { background: var(--cyber-blue); color: #000; box-shadow: 0 0 30px var(--cyber-blue); }
        .pink-btn { border-color: var(--cyber-pink); color: var(--cyber-pink); }
        .pink-btn:hover { background: var(--cyber-pink); color: #000; box-shadow: 0 0 30px var(--cyber-pink); }
        #matrix-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity: 0.1; }
        input, textarea, select { outline: none !important; background: transparent; color: white !important; border-bottom: 1px solid #164e63; }
        input::placeholder { color: #333 !important; }
        .section-header { border-left: 4px solid var(--cyber-blue); padding-left: 10px; margin-bottom: 15px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <canvas id="matrix-bg"></canvas>

<!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Firebase Firestore -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- EVLYN CORE (Proprietary Logic) -->
    <script src="../evlyn/core.js"></script>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyA-RGhMcIphrNsp4gQLnxkLw0xkdIKk_4E",
            authDomain: "attorney-law-6f0ea.firebaseapp.com",
            projectId: "attorney-law-6f0ea",
            storageBucket: "attorney-law-6f0ea.firebasestorage.app",
            messagingSenderId: "694634964455",
            appId: "1:694634964455:web:3df4aec1e4905fb1d3c942",
            measurementId: "G-YF0GZLD14K"
        };

        // Initialize Firebase with Compatibility Mode (v8)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        console.log("AEGIS_STANDALONE_SYNC: PROTOCOL v8 ACTIVE");

        let currentMode = 'lawyer';

        // --- GLOBAL HANDLERS (NO SERVER REQUIRED) ---
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-lawyer').classList.toggle('opacity-50', mode !== 'lawyer');
            document.getElementById('btn-judge').classList.toggle('opacity-50', mode !== 'judge');
        }

        async function runTrial() {
            const data = {
                accused: {
                    name: document.getElementById('acc-name').value,
                    gender: document.getElementById('acc-gender').value,
                    class: document.getElementById('acc-class').value,
                    dept: document.getElementById('acc-dept').value,
                    statement: document.getElementById('p-accused').value
                },
                victim: {
                    name: document.getElementById('vic-name').value,
                    gender: document.getElementById('vic-gender').value,
                    class: document.getElementById('vic-class').value,
                    dept: document.getElementById('vic-dept').value,
                    statement: document.getElementById('p-victim').value
                },
                witnesses: Array.from(document.querySelectorAll('.witness-item')).map(item => ({
                    name: item.querySelector('.w-name').value,
                    text: item.querySelector('.witness-text').value
                })).filter(w => w.name),
                category: document.getElementById('case-title').value
            };

            if(!data.accused.name || !data.category) return alert('Input Required.');
            
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');

            try {
                // EXTERNAL AI CORE (DeepSeek API via evlyn/core.js)
                const content = await EVLYN_AI.process(data, currentMode);
                
                document.getElementById('ai-output').innerHTML = content.replace(/\n/g, '<br>');
                document.getElementById('case-id').innerText = `UUID: #${Math.random().toString(36).substr(2,9).toUpperCase()}`;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-container').classList.remove('hidden');

                // DIRECT CLOUD RECORD STORAGE (No Server Proxy)
                await db.collection("cases").add({
                    ...data,
                    ai_result: content,
                    created_at: firebase.firestore.FieldValue.serverTimestamp(),
                    mode: currentMode
                });
                loadCases();
            } catch(e) { 
                console.error("SYNC_FAIL:", e);
                document.getElementById('loading').classList.add('hidden');
            }
        }

        async function loadCases() {
            try {
                const snapshot = await db.collection("cases").orderBy("created_at", "desc").limit(5).get();
                document.getElementById('cases-list').innerHTML = snapshot.docs.map(doc => {
                    const c = doc.data();
                    return `<div class="border-b border-white/5 py-1">[${c.accused?.dept || "UNK"}] ${c.accused?.name || "LOG"} vs ${c.category}</div>`;
                }).join('');
            } catch(e) {}
        }
        loadCases();
    </script>

    <script>
        window.currentMode = 'lawyer';
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const char = '01';
        const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f2ff';
            ctx.font = fontSize + 'px Rajdhani';
            for(let i = 0; i < drops.length; i++) {
                const text = char.charAt(Math.floor(Math.random() * char.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        function setMode(mode) {
            window.currentMode = mode;
            document.getElementById('btn-lawyer').classList.toggle('opacity-50', mode !== 'lawyer');
            document.getElementById('btn-judge').classList.toggle('opacity-50', mode !== 'judge');
        }

        function addWitness() {
            const container = document.getElementById('witness-container');
            const div = document.createElement('div');
            div.className = 'witness-item bg-white/5 p-3 rounded border border-white/10 animate__animated animate__fadeInDown';
            div.innerHTML = `
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input class="w-name text-[10px] bg-transparent border-b border-white/10" placeholder="Witness Name">
                    <input class="w-dept text-[10px] bg-transparent border-b border-white/10" placeholder="Witness Dept">
                </div>
                <textarea class="witness-text w-full h-12 text-[10px] bg-transparent border-none placeholder-gray-600" placeholder="Observation record..."></textarea>
            `;
            container.appendChild(div);
        }

        async function runTrial() {
            const data = {
                accused: {
                    name: document.getElementById('acc-name').value,
                    gender: document.getElementById('acc-gender').value,
                    class: document.getElementById('acc-class').value,
                    dept: document.getElementById('acc-dept').value,
                    statement: document.getElementById('p-accused').value
                },
                victim: {
                    name: document.getElementById('vic-name').value,
                    gender: document.getElementById('vic-gender').value,
                    class: document.getElementById('vic-class').value,
                    dept: document.getElementById('vic-dept').value,
                    statement: document.getElementById('p-victim').value
                },
                witnesses: Array.from(document.querySelectorAll('.witness-item')).map(item => ({
                    name: item.querySelector('.w-name').value,
                    dept: item.querySelector('.w-dept').value,
                    text: item.querySelector('.witness-text').value
                })).filter(w => w.name || w.text),
                category: document.getElementById('case-title').value
            };

            if(!data.accused.name || !data.category) return alert('ACCUSED NAME and CASE CATEGORY are required.');

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');

            const fullPrompt = `CASE ANALYSIS REQUEST
            CATEGORY: ${data.category}
            ---
            ACCUSED: ${data.accused.name} | Dept: ${data.accused.dept} | State: ${data.accused.statement}
            ---
            VICTIM: ${data.victim.name} | Dept: ${data.victim.dept} | State: ${data.victim.statement}
            ---
            WITNESS_LOGS: ${JSON.stringify(data.witnesses)}
            ---
            ROLE: Act as AI ${currentMode.toUpperCase()}. Provide a detailed academic legal perspective.
            STRICT POLICY: Limit to college-level disciplinary actions (Suspension, Community Service, Official Apology). NO permanent career damage. 
            THEME: Use technical, futuristic, cyberpunk legal terminology.`;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        prompt: data.category, 
                        currentMode,
                        rawData: data // Pass all local data to EVLYN
                    })
                });
                const result = await res.json();
                if(result.error) throw new Error(result.error);

                document.getElementById('ai-output').innerHTML = result.choices[0].message.content.split('\n').map(l => `<p>${l}</p>`).join('');
                document.getElementById('case-id').innerText = `UUID: #${Math.random().toString(36).substr(2,9).toUpperCase()}`;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-container').classList.remove('hidden');

                // SYNC
                await fetch('/api/cases', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        subject: data.accused, 
                        incident: { title: data.category, impact: data.victim.statement },
                        witnesses: data.witnesses.map(w => `${w.name} (${w.dept}): ${w.text}`),
                        ai_result: result.choices[0].message.content
                    })
                });
                loadCases();
            } catch(e) {
                alert('SYSTEM_ERROR: ' + e.message);
                document.getElementById('loading').classList.add('hidden');
            }
        }

        async function loadCases() {
            try {
                const res = await fetch('/api/cases');
                const list = await res.json();
                document.getElementById('cases-list').innerHTML = list.slice(0,8).map(c => `
                    <div class="border-b border-white/5 py-1">
                        [${c.subject?.dept || '??'}] ${c.subject?.name} vs ${c.incident?.title}
                    </div>
                `).join('');
            } catch(e) {}
        }
        loadCases();
    </script>
</body>
</html>
