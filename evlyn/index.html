<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVLYN NEURAL INTERFACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --evlyn-hex: #ff00ea; --evlyn-bg: #030005; }
        body { background: var(--evlyn-bg); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .evlyn-font { font-family: 'Orbitron', sans-serif; }
        .neural-panel { background: rgba(255, 0, 234, 0.03); border: 1px solid rgba(255, 0, 234, 0.2); box-shadow: 0 0 30px rgba(255, 0, 234, 0.05); }
        .cyber-input { background: transparent; border: none; border-bottom: 1px solid rgba(255, 0, 234, 0.3); outline: none; transition: 0.3s; }
        .cyber-input:focus { border-bottom-color: var(--evlyn-hex); box-shadow: 0 5px 15px -5px var(--evlyn-hex); }
        .scanline { width: 100%; height: 2px; background: var(--evlyn-hex); position: absolute; opacity: 0.3; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .matrix-glitch { animation: glitch 1s infinite alternate; }
        @keyframes glitch { 
            0% { transform: translate(0); } 
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="scanline"></div>
    
    <div class="max-w-4xl w-full p-6 neural-panel rounded-lg relative overflow-hidden">
        <div class="flex items-center justify-between mb-8 border-b border-pink-900 pb-4">
            <h1 class="evlyn-font text-3xl text-pink-500 font-bold tracking-tighter matrix-glitch">EVLYN_CORE <span class="text-xs font-normal opacity-50">v9.0_NEURAL</span></h1>
            <div class="text-right">
                <p class="text-[10px] uppercase text-pink-400">DeepSeek Link Status</p>
                <p class="text-xs text-green-400">STABLE_ENCRYPTED</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] uppercase text-pink-500 block mb-2">Internal Meta-Prompt</label>
                    <textarea id="neural-prompt" class="w-full h-32 p-4 cyber-input bg-pink-900/10 text-pink-100 text-sm resize-none" placeholder="Enter raw systemic context for EVLYN..."></textarea>
                </div>
                
                <div>
                    <label class="text-[10px] uppercase text-pink-500 block mb-2">Subject Data Feed</label>
                    <input id="feed-data" class="w-full p-2 cyber-input text-sm" placeholder="e.g. USER_01 // VIOLATION: FRAUD">
                </div>

                <button onclick="igniteNeuralLink()" id="ignite-btn" class="w-full py-3 bg-pink-600/20 border border-pink-500 text-pink-500 evlyn-font hover:bg-pink-500 hover:text-white transition-all">IGNITE NEURAL LINK</button>
            </div>

            <div class="neural-panel p-4 rounded bg-black/40 h-[280px] overflow-y-auto font-mono text-xs">
                <div id="neural-terminal" class="text-pink-300 space-y-2">
                    <p class="opacity-40 italic mt-20 text-center">Awaiting data input...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- EVLYN SCRIPT LINK -->
    <script src="../evlyn/core.js"></script>
    <script>
        function logToTerminal(msg, type = 'log') {
            const term = document.getElementById('neural-terminal');
            if(term.innerHTML.includes("Awaiting")) term.innerHTML = "";
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-500' : 'text-pink-300';
            div.innerHTML = `<span class="opacity-50">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function igniteNeuralLink() {
            const btn = document.getElementById('ignite-btn');
            const prompt = document.getElementById('neural-prompt').value;
            const data = document.getElementById('feed-data').value;

            if(!prompt || !data) return alert("All neural feeds must be active.");

            btn.disabled = true;
            btn.innerHTML = "COMPLETING SYNC...";
            logToTerminal("Establishing DeepSeek handshake...");

            try {
                // Mocking the structure expected by EVLYN_AI.process in core.js
                const structuredData = {
                    category: prompt,
                    accused: { name: data, statement: "Internal System Feed", dept: "CORE" },
                    victim: { name: "SYSTEM", statement: "Health Check", dept: "CORE" },
                    witnesses: []
                };

                const response = await EVLYN_AI.process(structuredData, "judge");
                logToTerminal("Data decoded. Displaying result...");
                logToTerminal(response.replace(/\n/g, "<br>"));
            } catch (err) {
                logToTerminal("CRITICAL_CORE_ERR: " + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = "IGNITE NEURAL LINK";
            }
        }
    </script>
</body>
</html>
